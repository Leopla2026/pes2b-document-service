server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location / { try_files $uri $uri/ /index.html; }
    location /downloads/ { try_files $uri =404; add_header Content-Disposition "attachment"; }

    location = /api-status {
        proxy_pass https://regiflowautomacao-irpf-pdf-reader.ftlz6v.easypanel.host/api/v1/health;
        proxy_ssl_server_name on;
        proxy_set_header Host regiflowautomacao-irpf-pdf-reader.ftlz6v.easypanel.host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"UP","service":"pes2b-document-docs"}';
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
