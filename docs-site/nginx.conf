server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  location = /swagger { return 301 /swagger/; }
  location = /swagger/ { try_files /swagger.html =404; }

  location = /openapi-proxy {
    proxy_pass https://document.pes2b.com/openapi.json;
    proxy_ssl_server_name on;
    proxy_set_header Host document.pes2b.com;
    proxy_set_header Accept application/json;
    proxy_connect_timeout 5s;
    proxy_read_timeout 15s;
  }

  location = /downloads/openapi.json {
    proxy_pass https://document.pes2b.com/openapi.json;
    proxy_ssl_server_name on;
    proxy_set_header Host document.pes2b.com;
    proxy_set_header Accept application/json;
    proxy_connect_timeout 5s;
    proxy_read_timeout 15s;
    add_header Content-Disposition 'attachment; filename="pes2b-document-api-openapi.json"' always;
  }

  location /downloads/ {
    try_files $uri =404;
    add_header Content-Disposition "attachment" always;
  }

  location = /api-status {
    proxy_pass https://document.pes2b.com/api/v1/health;
    proxy_ssl_server_name on;
    proxy_set_header Host document.pes2b.com;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
    proxy_set_header Accept application/json;
  }

  location = /api-info {
    proxy_pass https://document.pes2b.com/api/v1/info;
    proxy_ssl_server_name on;
    proxy_set_header Host document.pes2b.com;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
    proxy_set_header Accept application/json;
  }

  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"UP","service":"pes2b-document-docs"}';
  }

  location / { try_files $uri $uri/ /index.html; }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
